<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}WebChat{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --whatsapp-green: #00a884;
            --whatsapp-green-dark: #008069;
            --whatsapp-light-green: #d1f4cc;
            --whatsapp-bg: #f0f2f5;
            --whatsapp-sidebar: #ffffff;
            --whatsapp-chat-bg: #efeae2;
            --whatsapp-sent: #d9fdd3;
            --whatsapp-received: #ffffff;
            --text-primary: #111b21;
            --text-secondary: #667781;
            --text-muted: #8696a0;
            --border-color: #e9edef;
            --hover-color: #f5f6f6;
            --shadow: 0 1px 3px rgba(11, 20, 26, 0.13);
            --shadow-lg: 0 2px 10px rgba(11, 20, 26, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
            background: var(--whatsapp-bg);
            height: 100vh;
            color: var(--text-primary);
            line-height: 1.4;
            font-size: 14px;
            overflow: hidden;
        }

        .whatsapp-container {
            display: flex;
            height: 100vh;
            width: 100%;
            background: var(--whatsapp-sidebar);
            box-shadow: var(--shadow-lg);
        }

        /* Sidebar Styles */
        .sidebar {
            width: 400px;
            background: var(--whatsapp-sidebar);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            background: var(--whatsapp-sidebar);
            padding: 19px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-color);
        }

        .whatsapp-logo {
            color: var(--whatsapp-green);
            font-size: 19px;
            font-weight: 400;
            letter-spacing: -0.25px;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .header-btn {
            width: 40px;
            height: 40px;
            border: none;
            background: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-size: 20px;
            transition: background-color 0.2s;
        }

        .header-btn:hover {
            background: var(--hover-color);
        }

        .search-section {
            padding: 7px 12px 19px;
            background: var(--whatsapp-sidebar);
        }

        .search-wrapper {
            position: relative;
            background: var(--whatsapp-bg);
            border-radius: 8px;
            display: flex;
            align-items: center;
            padding: 8px 12px;
        }

        .search-icon {
            color: var(--text-muted);
            margin-right: 24px;
            font-size: 15px;
        }

        .search-input {
            border: none;
            outline: none;
            background: none;
            flex: 1;
            font-size: 15px;
            color: var(--text-primary);
            font-family: inherit;
        }

        .search-input::placeholder {
            color: var(--text-muted);
        }

        .filter-tabs {
            display: flex;
            gap: 8px;
            padding: 0 12px 8px;
            background: var(--whatsapp-sidebar);
        }

        .filter-tab {
            padding: 8px 16px;
            border: none;
            background: var(--whatsapp-bg);
            border-radius: 16px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .filter-tab.active {
            background: var(--whatsapp-green);
            color: white;
        }

        .filter-tab:hover:not(.active) {
            background: #e8e8e8;
        }

        .archived-section {
            padding: 13px 12px;
            background: var(--whatsapp-sidebar);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .archived-section:hover {
            background: var(--hover-color);
        }

        .archived-icon {
            width: 49px;
            height: 49px;
            background: var(--text-muted);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            color: white;
            font-size: 20px;
        }

        .archived-info {
            flex: 1;
        }

        .archived-title {
            font-size: 17px;
            font-weight: 400;
            color: var(--text-primary);
        }

        .archived-count {
            background: var(--whatsapp-green);
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
        }

        .chats-list {
            flex: 1;
            overflow-y: auto;
            background: var(--whatsapp-sidebar);
        }

        .chat-item {
            display: flex;
            align-items: center;
            padding: 12px;
            cursor: pointer;
            transition: background-color 0.2s;
            text-decoration: none;
            color: inherit;
            border-bottom: 1px solid rgba(233, 237, 239, 0.4);
        }

        .chat-item:hover {
            background: var(--hover-color);
        }

        .chat-item.active {
            background: #e7f3ff;
        }

        .chat-avatar {
            width: 49px;
            height: 49px;
            border-radius: 50%;
            margin-right: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 500;
            font-size: 18px;
            position: relative;
            flex-shrink: 0;
        }

        .chat-info {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 2px;
        }

        .chat-name {
            font-size: 17px;
            font-weight: 400;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-time {
            font-size: 12px;
            color: var(--text-muted);
            white-space: nowrap;
            margin-left: 6px;
        }

        .chat-preview {
            font-size: 14px;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .unread-badge {
            background: var(--whatsapp-green);
            color: white;
            border-radius: 50%;
            min-width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            margin-left: auto;
            flex-shrink: 0;
        }

        .online-indicator {
            width: 13px;
            height: 13px;
            background: var(--whatsapp-green);
            border-radius: 50%;
            border: 2px solid white;
            position: absolute;
            bottom: 0;
            right: 0;
        }

        /* Chat Area Styles */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--whatsapp-chat-bg);
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }

        .chat-header-bar {
            background: var(--whatsapp-sidebar);
            padding: 10px 16px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            box-shadow: var(--shadow);
        }

        .chat-user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            margin-right: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 500;
            font-size: 16px;
        }

        .chat-user-info {
            flex: 1;
        }

        .chat-user-name {
            font-size: 16px;
            font-weight: 400;
            color: var(--text-primary);
            margin-bottom: 1px;
        }

        .chat-user-status {
            font-size: 13px;
            color: var(--text-muted);
        }

        .chat-header-actions {
            display: flex;
            gap: 10px;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px 80px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .message {
            max-width: 65%;
            margin-bottom: 12px;
            position: relative;
        }

        .message.sent {
            align-self: flex-end;
        }

        .message.received {
            align-self: flex-start;
        }

        .message-bubble {
            padding: 6px 7px 8px 9px;
            border-radius: 7.5px;
            position: relative;
            word-wrap: break-word;
            box-shadow: 0 1px 0.5px rgba(11, 20, 26, 0.13);
        }

        .message.sent .message-bubble {
            background: var(--whatsapp-sent);
            border-bottom-right-radius: 2px;
        }

        .message.received .message-bubble {
            background: var(--whatsapp-received);
            border-bottom-left-radius: 2px;
        }

        .message-text {
            font-size: 14.2px;
            line-height: 19px;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .message-footer {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 4px;
            margin-top: 4px;
        }

        .message-time {
            font-size: 11px;
            color: var(--text-muted);
        }

        .message-status {
            font-size: 16px;
            color: #4fc3f7;
        }

        .message-input-area {
            background: var(--whatsapp-sidebar);
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .input-actions {
            display: flex;
            gap: 10px;
        }

        .input-btn {
            width: 40px;
            height: 40px;
            border: none;
            background: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-size: 20px;
            transition: background-color 0.2s;
        }

        .input-btn:hover {
            background: var(--hover-color);
        }

        .message-input-wrapper {
            flex: 1;
            background: var(--whatsapp-sidebar);
            border-radius: 21px;
            display: flex;
            align-items: center;
            padding: 9px 12px;
            border: 1px solid var(--border-color);
        }

        .message-input {
            flex: 1;
            border: none;
            outline: none;
            background: none;
            font-size: 15px;
            color: var(--text-primary);
            font-family: inherit;
            line-height: 20px;
            max-height: 100px;
            resize: none;
        }

        .message-input::placeholder {
            color: var(--text-muted);
        }

        .send-btn {
            width: 40px;
            height: 40px;
            border: none;
            background: var(--whatsapp-green);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            transition: background-color 0.2s;
        }

        .send-btn:hover {
            background: var(--whatsapp-green-dark);
        }

        /* Welcome Screen */
        .welcome-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--whatsapp-sidebar);
            text-align: center;
            padding: 40px;
        }

        .welcome-icon {
            width: 320px;
            height: 320px;
            background: var(--whatsapp-bg);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 120px;
            color: var(--whatsapp-green);
            margin-bottom: 32px;
        }

        .welcome-title {
            font-size: 32px;
            font-weight: 300;
            color: var(--text-secondary);
            margin-bottom: 16px;
        }

        .welcome-subtitle {
            font-size: 14px;
            color: var(--text-muted);
            line-height: 20px;
            max-width: 460px;
        }

        /* Scrollbar */
        .chats-list::-webkit-scrollbar,
        .messages-container::-webkit-scrollbar {
            width: 6px;
        }

        .chats-list::-webkit-scrollbar-track,
        .messages-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .chats-list::-webkit-scrollbar-thumb,
        .messages-container::-webkit-scrollbar-thumb {
            background: rgba(11, 20, 26, 0.2);
            border-radius: 3px;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                position: absolute;
                z-index: 10;
                height: 100vh;
            }

            .chat-area {
                display: none;
            }

            .chat-area.active {
                display: flex;
            }

            .sidebar.hidden {
                display: none;
            }

            .messages-container {
                padding: 20px 16px;
            }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    {% block content %}{% endblock %}
    
    {% block extra_js %}{% endblock %}
</body>
</html>
